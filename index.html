<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graph Runner : 그래프로 탈출하기</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section id="startScreen" class="start-screen">
      <div class="start-art" aria-hidden="true">
        <div class="sun"></div>
        <div class="mini-plane">
          <span></span><span></span><span></span><span></span>
        </div>
        <div class="runner-face">^_^</div>
      </div>
      <div class="start-copy">
        <p class="eyebrow">중학교 1학년 수학</p>
        <h1>Graph Runner<br>그래프로 탈출하기</h1>
        <p class="goal-text">
          기울기 a와 y절편 b를 조절하여 일차함수 y = ax + b의 그래프를 만들고,
          캐릭터가 그래프를 따라 출구와 보물상자에 도착하도록 도와주세요.
        </p>
        <button id="startButton" class="primary-button" type="button">게임 시작</button>
      </div>
    </section>

    <section id="gameScreen" class="game-screen hidden" aria-label="Graph Runner 게임 화면">
      <header class="top-bar">
        <div>
          <p class="eyebrow">Graph Runner</p>
          <h2 id="levelTitle">1단계</h2>
        </div>
        <div class="score-board" aria-live="polite">
          <span>점수</span>
          <strong id="scoreValue">0</strong>
        </div>
      </header>

      <section class="mission-band">
        <div>
          <strong id="missionTitle">미션</strong>
          <p id="missionText">기울기와 절편을 조절해 보세요.</p>
        </div>
        <div class="level-pills" aria-label="진행 단계">
          <span id="levelProgress">1 / 10</span>
        </div>
      </section>

      <section class="play-layout">
        <div class="graph-panel">
          <canvas id="graphCanvas" width="720" height="720" aria-label="좌표평면"></canvas>
        </div>

        <aside class="control-panel">
          <div class="formula-box">
            <span>현재 함수식</span>
            <strong id="formulaText">y = 1x + 0</strong>
          </div>

          <div id="guideLineBox" class="guide-line-box hidden">
            <span>주어진 직선</span>
            <strong id="guideFormulaText">y = -x + 2</strong>
          </div>

          <div class="control-group">
            <div class="control-header">
              <label for="slopeSlider">기울기 a</label>
              <output id="slopeValue">1</output>
            </div>
            <div class="step-row">
              <button class="round-button" id="slopeMinus" type="button" aria-label="기울기 줄이기">-</button>
              <input id="slopeSlider" type="range" min="-5" max="5" step="0.5" value="1">
              <button class="round-button" id="slopePlus" type="button" aria-label="기울기 늘리기">+</button>
            </div>
          </div>

          <div class="control-group">
            <div class="control-header">
              <label for="interceptSlider">y절편 b</label>
              <output id="interceptValue">0</output>
            </div>
            <div class="step-row">
              <button class="round-button" id="interceptMinus" type="button" aria-label="y절편 줄이기">-</button>
              <input id="interceptSlider" type="range" min="-8" max="8" step="0.5" value="0">
              <button class="round-button" id="interceptPlus" type="button" aria-label="y절편 늘리기">+</button>
            </div>
          </div>

          <div class="action-grid">
            <button id="runButton" class="primary-button" type="button">달리기</button>
            <button id="hintButton" class="secondary-button" type="button">힌트</button>
            <button id="retryButton" class="secondary-button" type="button">다시 도전</button>
          </div>

          <div id="feedbackBox" class="feedback-box" aria-live="polite">
            준비되면 달리기 버튼을 눌러 보세요.
          </div>
        </aside>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
